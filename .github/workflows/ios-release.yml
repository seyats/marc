name: iOS Release IPA

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: "Xcode export method"
        required: true
        default: ad-hoc
        type: choice
        options:
          - ad-hoc
          - app-store
          - development

jobs:
  archive:
    runs-on: macos-latest
    env:
      SCHEME: Unio
      PROJECT: Unio.xcodeproj
      ARCHIVE_PATH: build/Unio.xcarchive
      EXPORT_PATH: build/export
      BUNDLE_ID: app.unio.ios
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install xcodegen swiftlint swiftformat

      - name: Generate project
        run: xcodegen generate

      - name: Install signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${P12_BASE64:-}" ] || [ -z "${P12_PASSWORD:-}" ] || [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "Missing IOS_CERT_P12_BASE64, IOS_CERT_PASSWORD, or IOS_KEYCHAIN_PASSWORD."
            exit 1
          fi
          CERT_PATH="$RUNNER_TEMP/unio-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/unio-signing.keychain-db"
          printf '%s' "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${PROFILE_BASE64:-}" ] || [ -z "${PROFILE_NAME:-}" ]; then
            echo "Missing IOS_PROVISION_PROFILE_BASE64 or IOS_PROVISION_PROFILE_NAME."
            exit 1
          fi
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_NAME.mobileprovision"
          printf '%s' "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

      - name: Prepare export options
        env:
          EXPORT_METHOD: ${{ inputs.export_method }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${TEAM_ID:-}" ] || [ -z "${PROFILE_NAME:-}" ]; then
            echo "Missing APPLE_TEAM_ID or IOS_PROVISION_PROFILE_NAME."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP"
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive app
        env:
          EXPORT_METHOD: ${{ inputs.export_method }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
        run: |
          set -euo pipefail
          SIGNING_IDENTITY="Apple Distribution"
          if [ "$EXPORT_METHOD" = "development" ]; then
            SIGNING_IDENTITY="Apple Development"
          fi
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            clean archive

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$EXPORT_PATH"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Unio-ipa
          path: build/export/*.ipa
