name: iOS

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version
          swift --version
      - name: Install tools
        run: |
          brew install xcodegen swiftlint swiftformat
      - name: Generate project
        run: xcodegen generate
      - name: Build
        run: xcodebuild -project Unio.xcodeproj -scheme Unio -destination 'platform=iOS Simulator,name=iPhone 16 Pro' build
      - name: Test
        run: xcodebuild -project Unio.xcodeproj -scheme Unio -destination 'platform=iOS Simulator,name=iPhone 16 Pro' test
      - name: Lint
        run: |
          swiftlint
          swiftformat --lint Sources Tests
