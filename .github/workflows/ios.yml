name: iOS

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version
          swift --version
      - name: Install tools
        run: |
          brew install xcodegen swiftlint swiftformat
      - name: Generate project
        run: xcodegen generate
      - name: Build
        run: |
          set -o pipefail
          xcodebuild -project Unio.xcodeproj -scheme Unio -destination 'platform=iOS Simulator,name=iPhone 16 Pro' build 2>&1 | tee build.log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iOS-build-log
          path: build.log
      - name: Test
        run: xcodebuild -project Unio.xcodeproj -scheme Unio -destination 'platform=iOS Simulator,name=iPhone 16 Pro' test
      - name: Lint
        run: |
          swiftlint
          swiftformat Sources Tests --lint --exclude Sources/Infrastructure/SupabaseAdapters.swift
