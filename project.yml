name: Unio
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "26.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    TARGETED_DEVICE_FAMILY: 1
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.48.0
  Nuke:
    url: https://github.com/kean/Nuke.git
    from: 12.0.0
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.0.0
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    from: 4.4.0
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing.git
    from: 1.17.0
  SwiftCollections:
    url: https://github.com/apple/swift-collections.git
    from: 1.1.0
  SwiftAlgorithms:
    url: https://github.com/apple/swift-algorithms.git
    from: 1.2.0
targets:
  AppCore:
    type: framework
    platform: iOS
    sources:
      - Sources/AppCore
  DesignSystem:
    type: framework
    platform: iOS
    sources:
      - Sources/DesignSystem
    dependencies:
      - target: AppCore
  Infrastructure:
    type: framework
    platform: iOS
    sources:
      - Sources/Infrastructure
    dependencies:
      - target: AppCore
      - package: Supabase
        product: Supabase
      - package: Nuke
        product: Nuke
      - package: GRDB
        product: GRDB
      - package: Lottie
        product: Lottie
      - package: SwiftCollections
        product: Collections
      - package: SwiftAlgorithms
        product: Algorithms
  AuthFeature:
    type: framework
    platform: iOS
    sources:
      - Sources/AuthFeature
    dependencies:
      - target: AppCore
      - target: DesignSystem
  HomeFeature:
    type: framework
    platform: iOS
    sources:
      - Sources/HomeFeature
    dependencies:
      - target: AppCore
      - target: DesignSystem
  ChatsFeature:
    type: framework
    platform: iOS
    sources:
      - Sources/ChatsFeature
    dependencies:
      - target: AppCore
      - target: DesignSystem
  ProfileFeature:
    type: framework
    platform: iOS
    sources:
      - Sources/ProfileFeature
    dependencies:
      - target: AppCore
      - target: DesignSystem
  AIHubFeature:
    type: framework
    platform: iOS
    sources:
      - Sources/AIHubFeature
    dependencies:
      - target: AppCore
      - target: DesignSystem
  IntentsFeature:
    type: framework
    platform: iOS
    sources:
      - Sources/IntentsFeature
    dependencies:
      - target: AppCore
  Unio:
    type: application
    platform: iOS
    sources:
      - Sources/UnioApp
    resources:
      - Resources
      - path: Config/GoogleService-Info.plist
        optional: true
    dependencies:
      - target: AppCore
      - target: DesignSystem
      - target: Infrastructure
      - target: AuthFeature
      - target: HomeFeature
      - target: ChatsFeature
      - target: ProfileFeature
      - target: AIHubFeature
      - target: IntentsFeature
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.unio.ios
        PRODUCT_NAME: Unio
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Unio
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: Unio использует камеру для аватара, историй, постов и видеосообщений.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Unio использует микрофон для голосовых сообщений, звонков и прямых эфиров.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Unio использует медиатеку для выбора фото и видео.
        INFOPLIST_KEY_NSFaceIDUsageDescription: Unio использует Face ID для безопасного входа в аккаунт.
        INFOPLIST_KEY_UNIO_APP_GROUP: group.app.unio
  AppCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/AppCoreTests
    dependencies:
      - target: AppCore
  AppFeatureTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/AppFeatureTests
    dependencies:
      - target: AppCore
      - target: DesignSystem
      - target: AuthFeature
      - target: HomeFeature
      - target: ChatsFeature
      - target: ProfileFeature
      - target: AIHubFeature
      - target: IntentsFeature
      - package: SnapshotTesting
        product: SnapshotTesting
schemes:
  Unio:
    build:
      targets:
        Unio: all
    test:
      targets:
        - AppCoreTests
        - AppFeatureTests
